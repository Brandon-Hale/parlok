name: Publish

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for hatch-vcs
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: python -m build
      - name: Run the test suite against the built wheel
        working-directory: sdk/python
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install --upgrade pip
          /tmp/verify/bin/pip install dist/*.whl pytest pytest-asyncio
          /tmp/verify/bin/pytest
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi    # must match Trusted Publisher config on PyPI
    permissions:
      id-token: write    # required for PyPI OIDC
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
